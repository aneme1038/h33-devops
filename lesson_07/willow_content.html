<h3>Willow</h3>

<p>Willows are trees or shrubs in the genus Salix, in the family Salicaceae. There are about 400 species of willows, mostly found in the temperate Northern Hemisphere. Willows are often found near water, and their branches are commonly used for weaving baskets and other items.</p>
